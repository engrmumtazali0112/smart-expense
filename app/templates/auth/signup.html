<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — SmartExpense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-purple-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-user-plus text-purple-700 text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Create account</h1>
            <p class="text-gray-500 text-sm mt-1">Start managing your finances</p>
        </div>
        <div id="error-msg" class="hidden bg-red-50 text-red-600 text-sm px-4 py-3 rounded-lg mb-4"></div>
        <form id="signup-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" name="name" required placeholder="Mumtaz Ali"
                    class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required placeholder="you@example.com"
                    class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required placeholder="Min 8 characters"
                    class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm">
            </div>
            <button type="submit" id="submit-btn"
                class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition text-sm">
                Create Account
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-6">
            Already have an account? <a href="/login" class="text-purple-600 font-medium hover:underline">Sign in</a>
        </p>
    </div>
</div>
<script>
$('#signup-form').on('submit', function(e) {
    e.preventDefault();
    const btn = $('#submit-btn');
    btn.text('Creating...').prop('disabled', true);
    $.ajax({
        url: '/api/auth/signup', method: 'POST',
        data: $(this).serialize(),
        success: (res) => window.location.href = res.redirect,
        error: (xhr) => {
            $('#error-msg').text(xhr.responseJSON?.detail || 'Signup failed').removeClass('hidden');
            btn.text('Create Account').prop('disabled', false);
        }
    });
});
</script>
</body>
</html>
