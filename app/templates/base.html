<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SmartExpense{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="bg-gray-50 font-sans">
<div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-lg flex-shrink-0 hidden md:flex flex-col">
        <div class="p-6 border-b border-gray-100">
            <h1 class="text-xl font-bold text-purple-700">
                <i class="fas fa-chart-pie mr-2"></i>SmartExpense
            </h1>
            <p class="text-xs text-gray-400 mt-1">Invoice & Expense Manager</p>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <a href="/dashboard"
               class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-purple-50 hover:text-purple-700 transition {% if request.url.path == '/dashboard' %}active{% endif %}">
                <i class="fas fa-home w-4"></i> Dashboard
            </a>
            <a href="/invoices"
               class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-purple-50 hover:text-purple-700 transition {% if '/invoice' in request.url.path %}active{% endif %}">
                <i class="fas fa-file-invoice w-4"></i> Invoices
            </a>
            <a href="/expenses"
               class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-purple-50 hover:text-purple-700 transition {% if '/expense' in request.url.path %}active{% endif %}">
                <i class="fas fa-wallet w-4"></i> Expenses
            </a>
        </nav>
        <div class="p-4 border-t border-gray-100">
            {% if user %}
            <div class="flex items-center gap-3 mb-3">
                <div class="w-9 h-9 rounded-full bg-purple-100 flex items-center justify-center text-purple-700 font-bold text-sm">
                    {{ user.name[0].upper() }}
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-gray-700 truncate">{{ user.name }}</p>
                    <p class="text-xs text-gray-400 truncate">{{ user.email }}</p>
                </div>
            </div>
            {% endif %}
            <a href="/logout" class="flex items-center gap-2 text-sm text-gray-500 hover:text-red-500 transition">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 overflow-auto">
        <!-- Mobile header -->
        <header class="md:hidden bg-white shadow-sm px-4 py-3 flex items-center justify-between sticky top-0 z-10">
            <h1 class="text-lg font-bold text-purple-700">
                <i class="fas fa-chart-pie mr-2"></i>SmartExpense
            </h1>
            <button onclick="toggleMobileMenu()" class="text-gray-600 p-1">
                <i class="fas fa-bars text-lg"></i>
            </button>
        </header>
        <div class="p-5 md:p-8">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>

<!-- Toast container -->
<div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2 max-w-xs"></div>

<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
